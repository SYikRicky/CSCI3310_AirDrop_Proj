constraintlayout = { group = "androidx.constraintlayout", name = "constraintlayout", version.ref = "constraintlayout" }
nearby-connections = { group = "com.google.android.gms", name = "play-services-nearby", version.ref = "nearby" }
fragment = { group = "androidx.fragment", name = "fragment", version.ref = "fragment" }
lifecycle-service = { group = "androidx.lifecycle", name = "lifecycle-service", version.ref = "lifecycleService" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }

